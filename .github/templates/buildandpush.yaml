name: Build and push immage
on:
  workflow_call:
    inputs:
      target_dir:
        type: string
        required: true
        description: Target dir for multirepo docker image
      image_name:
        type: string
        required: true
        description: Target Image name
      build_args:
        type: string
        required: true
        description: Docker image build args
      platforms:
        type: string
        required: false
        default: linux/amd64
        description: Platforms to build image for
jobs:
  release:
    name: Build and Release ${{ inputs.target_dir }} Image
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash     
    env:
      github: "ghcr.io/manpreetsnehra/${{ inputs.target_dir }}"
      dockerhub: "${{ secrets.DOCKERHUB_ACCOUNT }}/${{ inputs.target_dir }}"
      ecr: "${{ secrets.ECR_REPO_PATH }}/${{ inputs.target_dir }}          "
      gitlab: "${{ secrets.GITLAB_REGISTRY_PATH }}/${{ inputs.target_dir }}"
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all    
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Log in to the Github Container registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Log in to the Docker Container registry
      if: contains(github.ref,'tag')
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_ACCOUNT }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Test Build for ${{ inputs.target_dir }}
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.target_dir }}
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/manpreetsnehra/${{ inputs.target_dir }}:test
        platforms: ${{ inputs.platforms }}
        build-args: ${{ inputs.build_args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
 
    - name: Get tag
      if: contains(github.ref,'tag')
      id: tag
      uses: devops-actions/action-get-tag@v1.0.1
      with:
        strip_v: true

    - name: Log in to the Gitlab Container registry
      if: contains(github.ref,'tag')
      uses: docker/login-action@v4
      with:
        registry: registry.gitlab.com
        username: ${{ secrets.GITLAB_ACCOUNT }}
        password: ${{ secrets.GITLAB_TOKEN }} 

    - name: Configure AWS credentials
      if: contains(github.ref,'tag')
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: us-east-1
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        role-duration-seconds: 900
        role-session-name: GitHub

    - name: Login to Amazon ECR
      if: contains(github.ref,'tag')
      run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_PATH }}

    - name: Build and Push images to GitHub
      if: contains(github.ref,'tag') && contains(inputs.target_dir,'deploy')
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.target_dir }}
        push: true
        tags: |
          ghcr.io/manpreetsnehra/${{ inputs.target_dir }}:${{steps.tag.outputs.tag}}
          ghcr.io/manpreetsnehra/${{ inputs.target_dir }}:latest
          ${{ secrets.DOCKERHUB_ACCOUNT }}/${{ inputs.target_dir }}:${{steps.tag.outputs.tag}}
          ${{ secrets.DOCKERHUB_ACCOUNT }}/${{ inputs.target_dir }}:latest
          ${{ secrets.ECR_REPO_PATH }}/${{ inputs.target_dir }}:${{steps.tag.outputs.tag}}
          ${{ secrets.ECR_REPO_PATH }}/${{ inputs.target_dir }}:latest
          ${{ secrets.GITLAB_REGISTRY_PATH }}/${{ inputs.target_dir }}:latest
        platforms: ${{ inputs.platforms }}
        build-args: ${{ inputs.build_args }}
        cache-from: type=gha

