name: comfyui Docker Image
on:
  push:
    paths:
      - 'comfyui/**'
      - '.github/workflows/comfyui.yaml'
  schedule:
      - cron: '0 0 * * 0'

jobs: 
  release:
    name: Build and Release Deploy Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Log in to the Gitlab Container registry
      uses: docker/login-action@v4
      with:
        registry: registry.gitlab.com
        username: ${{ secrets.GITLAB_ACCOUNT }}
        password: ${{ secrets.GITLAB_TOKEN }} 

    - name: Log in to the Github Container registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all    
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and Push images
      uses: docker/build-push-action@v7
      with:
        context: comfyui
        push: true
        tags: |
          ghcr.io/manpreetsnehra/comfyui:latest
          ${{ secrets.GITLAB_REGISTRY_PATH }}/comfyui:latest
        platforms: linux/amd64
