name: Images for Kubernetes pods
on:
  push:
    branches:
      - master
    paths:
      - codeserver/**
      - nginx/**
      - comfyui/**
      - whisparr/**
      - .github/workflows/others-push.yaml
  schedule:
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-
  cancel-in-progress: true

jobs:
  build-n-publish:
    if: contains(github.ref,'master')
    needs: changed-images
    name: Build and Release Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      packages: write
      security-events: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-comfyui
      cancel-in-progress: true               
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest Runner Version and set repos
        id: versions
        run: |

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          
      - name: Log in to the Gitlab Container registry
        uses: docker/login-action@v4
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_ACCOUNT }}
          password: ${{ secrets.GITLAB_TOKEN }} 

      - name: Build and Push images to GitHub
        uses: docker/build-push-action@v7
        with:
          context: comfyui
          push: true
          labels: org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
          tags: |
            ghcr.io/${{ github.repository_owner }}/comfyui:latest
            ${{ secrets.GITLAB_K8S_REGISTRY }}/comfyui:latest
          platforms: linux/amd64
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/comfyui:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          hide-progress: true
          scanners: 'vuln'
          severity: "MEDIUM,HIGH,CRITICAL"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db


      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: comfyui
