name: Images for Kubernetes pods
on:
  pull_request:
    paths:
      - comfyui/**
      - .github/workflows/comfyui-pr.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-others
  cancel-in-progress: true

jobs: 
  test-image:
    name: Build and Test Container Images
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-comfyui
      cancel-in-progress: true    
    permissions:
      contents: read
      pull-requests: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
         
      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Test Build for comfyui
        uses: docker/build-push-action@v7
        with:
          context: comfyui
          push: true
          sbom: true
          tags: ghcr.io/${{ github.repository_owner }}/comfyui:test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/comfyui:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          hide-progress: true
          scanners: 'vuln'
          severity: "MEDIUM,HIGH,CRITICAL"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: comfyui