name: Images for Kubernetes pods
on:
  push:
    branches:
      - master
    paths:
      - codeserver/**
      - nginx/**
      - comfyui/**
      - whisparr/**
      - .github/workflows/others-push.yaml
  schedule:
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-
  cancel-in-progress: true

jobs:
  changed-images:
    name: Get Changed Files for Testing
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changes.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_exclude_current_dir: true
          matrix: true
          files_ignore: |
            charts/**
            deploy/**
            .github/**
      
      - name: Schedule changes
        id: changes
        run: |
          if [[ ${{ steps.changed-files.outputs.all_changed_files }} != '[]' ]]
          then
            echo changes='${{ steps.changed-files.outputs.all_changed_files }}' >> $GITHUB_OUTPUT
          else
            echo changes='["codeserver","comfyui","nginx","whisparr"]' >> $GITHUB_OUTPUT
          fi      

  build-n-publish:
    if: contains(github.ref,'master')
    needs: changed-images
    name: Build and Release Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      packages: write
      security-events: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.changed-images.outputs.images) }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.image }}
      cancel-in-progress: true               
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest Runner Version and set repos
        id: versions
        run: |

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          
      - name: Log in to the Gitlab Container registry
        uses: docker/login-action@v4
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_ACCOUNT }}
          password: ${{ secrets.GITLAB_TOKEN }} 

      - name: Build and Push images to GitHub
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image }}
          push: true
          labels: org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ${{ secrets.GITLAB_K8S_REGISTRY }}/${{ matrix.image }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          build-args: CODER_USER=${{ secrets.CODER_USER }}          

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: ${{ matrix.image }}
