name: Images for Kubernetes pods
on:
  pull_request:
    paths:
      - codeserver/**
      - nginx/**
      - comfyui/**
      - whisparr/**
      - .github/workflows/others-pr.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-others
  cancel-in-progress: true

jobs: 
  changed-images:
    name: Get Changed Files for Testing
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_exclude_current_dir: true
          matrix: true
          files_ignore: |
            charts/**
            deploy/**
            .github/**

  test-image:
    name: Build and Test Container Images
    if: github.event_name == 'pull_request' && needs.changed-images.outputs.images != '[]'
    needs: changed-images
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.image }}
      cancel-in-progress: true    
    permissions:
      contents: read
      pull-requests: read
      packages: write
      security-events: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.changed-images.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
         
      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Test Build for ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image }}
          push: true
          sbom: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          hide-progress: true
          scanners: 'vuln'
          severity: "MEDIUM,HIGH,CRITICAL"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: ${{ matrix.image }}