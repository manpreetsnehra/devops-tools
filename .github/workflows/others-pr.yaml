name: Images for Kubernetes pods
on:
  pull_request:
    paths-ignore:
      - deploy/**
      - charts/**
  schedule:
    - cron: "0 2 * * 0"

jobs: 
  changed-images:
    if: github.event_name == 'pull_request'
    name: Get Changed Files for Testing
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_exclude_current_dir: true
          matrix: true
          files_ignore: |
            charts/**
            deploy/**
            .github/**

  test-image:
    name: Build and Test Container Images
    if: github.event_name == 'pull_request'
    needs: changed-images
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: true    
    permissions:
      contents: read
      pull-requests: write
      packages: write
    strategy:
      matrix:
        target: ${{ fromJSON(needs.changed-images.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
         
      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Test Build for ${{ matrix.target }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.target }}
          push: true
          sbom: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}:test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}:test'
          format: 'json'
          hide-progress: true
          output: trivy-results.json
          scanners: 'vuln'
          severity: "MEDIUM,HIGH,CRITICAL"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db

      - name: Read README.md
        id: package
        uses: jaywcjlove/github-action-read-file@v2.1.0
        with:
          path: trivy-results.json

      - name: Update PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Trivy Security Report for ${{ matrix.target }}')
            });
            const output = `#### Trivy Security Output
                \`\`\`
                ${{ steps.package.outputs.content }}
                \`\`\`
                `;
            // 3. Delete previous comment so PR timeline makes sense
            if (botComment) {
              github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });        