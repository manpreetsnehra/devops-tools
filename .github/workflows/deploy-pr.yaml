name: Image for CI/CD pipelines
on:
  pull_request:
    paths:
      - deploy/**
  push:
    branches:
      - master
    paths:
      - deploy/**
    tags:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-deploy
  cancel-in-progress: true

jobs: 
  test-image:
    name: Build and Test CI/CD Image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get latest Runner Version and set repos
        id: versions
        run: |
          echo runner=`curl -sL "https://api.github.com/repos/actions/runner/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/'|cut -b 2-` >> $GITHUB_OUTPUT
          echo container_hooks=`curl -sL "https://api.github.com/repos/actions/runner-container-hooks/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/'|cut -b 2-` >> $GITHUB_OUTPUT
          echo helmfile=`curl -sL "https://api.github.com/repos/helmfile/helmfile/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/'|cut -b 2-` >> $GITHUB_OUTPUT
          echo kubectl=`curl -sL https://dl.k8s.io/release/stable.txt` >> $GITHUB_OUTPUT
          echo helm=`curl -sL "https://api.github.com/repos/helm/helm/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/'` >> $GITHUB_OUTPUT
          echo gitlab_tofu=`curl -s https://gitlab.com/api/v4/projects/53866919/releases/ | jq '.[]' | jq -r '.name' | head -1` >> $GITHUB_OUTPUT
          echo tfsec=`curl -sL "https://api.github.com/repos/aquasecurity/tfsec/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/'|cut -b 2-` >> $GITHUB_OUTPUT

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Test Build for ${{ matrix.target }}
        uses: docker/build-push-action@v7
        with:
          context: deploy
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/deploy:test
          platforms: linux/amd64
          sbom: true
          build-args: |
            RUNNER_VERSION=${{ steps.versions.outputs.runner }}
            RUNNER_CONTAINER_HOOKS_VERSION=${{ steps.versions.outputs.container_hooks }}
            HELMFILE_VERSION=${{ steps.versions.outputs.helmfile }}
            KUBECTL_VERSION=${{ steps.versions.outputs.kubectl }}
            HELM_VERSION=${{ steps.versions.outputs.helm }}
            GITLAB_TOFU_VERSION=${{ steps.versions.outputs.gitlab_tofu }}
            TFSEC_VERSION=${{ steps.versions.outputs.tfsec }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/deploy:test'
          format: 'json'
          hide-progress: true
          output: trivy-results.json
          scanners: 'vuln'
          severity: "MEDIUM,HIGH,CRITICAL"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db

      - name: Post Trivy results as PR comment
        uses: aarontravass/trivy-pr-comment@v0.0.3
