name: Image for CI/CD pipelines
on:
  pull_request:
    paths:
      - 'deploy/**'
      - '.github/workflows/deploy-pr.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-deploy
  cancel-in-progress: true

jobs: 
  test-image:
    name: Build and Test CI/CD Image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all    
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get latest Runner Version and set repos
        id: versions
        run: |
          echo helmfile=`curl -sL "https://api.github.com/repos/helmfile/helmfile/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/'|cut -b 2-` >> $GITHUB_OUTPUT
          echo gitlab_tofu=`curl -s https://gitlab.com/api/v4/projects/53866919/releases/ | jq '.[]' | jq -r '.name' | head -1` >> $GITHUB_OUTPUT

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Test Build for ${{ matrix.target }}
        uses: docker/build-push-action@v7
        with:
          context: deploy
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/deploy:test
          platforms: linux/amd64
          sbom: true
          build-args: |
            HELMFILE_VERSION=${{ steps.versions.outputs.helmfile }}
            GITLAB_TOFU_VERSION=${{ steps.versions.outputs.gitlab_tofu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/deploy:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          hide-progress: true
          scanners: 'vuln'
          severity: "MEDIUM,HIGH,CRITICAL"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: deploy